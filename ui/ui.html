<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title">Doxmaxima Ayarlar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="ui.css">
</head>
<body>
    <!-- Doxmaxima Çeviri -->
    <div class="header" style="border-bottom-color: rgba(16, 185, 129, 0.2); margin-bottom: 15px; padding-bottom: 10px;">
        <h1 data-i18n="header_translate" style="color: #10b981; text-shadow: 0 0 8px rgba(16, 185, 129, 0.3);">Doxmaxima Çeviri</h1>
        <label class="switch">
            <input type="checkbox" id="toggle-ceviri">
            <span class="slider round"></span>
        </label>
    </div>

    <div class="settings-container" id="ceviri-settings" style="margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 20px;">
        <!-- 1. API Anahtarları -->
        <div class="setting-group">
            <div class="setting-header">
                <label data-i18n="api_keys">API Anahtarları</label>
            </div>
            <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 5px;">
                <input type="password" id="api-gemini" placeholder="GEMINI API KEY" class="custom-input">
                <input type="password" id="api-groq" placeholder="GROQ API KEY" class="custom-input">
                <input type="password" id="api-deepl" placeholder="DEEPL API KEY" class="custom-input">
            </div>
        </div>

        <!-- 2. AI Kontrol Merkezi -->
        <div class="setting-group" style="margin-top: 5px;">
            <div class="setting-header">
                <label data-i18n="ai_center">AI Kontrol Merkezi</label>
            </div>
            <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 5px;">
                <div class="custom-select-wrapper">
                    <select id="ai-model" class="custom-select">
                        <option value="gemini-3-flash-preview">Gemini 3.0</option>
                        <option value="gemini-2.5-flash">Gemini 2.5</option>
                        <option value="gemini-2.5-flash-lite">Gemini 2.5 Lite</option>
                        <option value="gemini-3.1-pro-preview">Gemini 3.1 (ücretli)</option>
                        <option value="gemini-3.1-flash-lite">Gemini 3.1 flash</option>
                        <option value="gemini-3.1-flash-lite-preview">Gemini 3.1 flash preview</option>
                        <option value="DeepL-Free">DeepL Free</option>
                        <option value="DeepL-Pro">DeepL Pro (ücretli)</option>
                        <option value="meta-llama/llama-4-scout-17b-16e-instruct">Llama 4</option>
                        <option value="moonshotai/kimi-k2-instruct-0905">Kimi K2</option>
                        <option value="llama-3.3-70b-versatile">Llama 3.3</option>
                    </select>
                </div>
                <div class="custom-select-wrapper">
                    <select id="ai-mode" class="custom-select">
                        <option value="tr">Türkçe Çevirisi</option>
                        <option value="en">İngilizce Çevirisi</option>
                        <option value="de">Almanca Çevirisi</option>
                        <option value="ru">Rusça Çevirisi</option>
                        <option value="zh">Çince Çevirisi</option>
                        <option value="ja">Japonca Çevirisi</option>
                        <option value="fr">Fransızca Çevirisi</option>
                        <option value="it">İtalyanca Çevirisi</option>
                        <option value="az">Azerbaycanca Çevirisi</option>
                        <option value="es">İspanyolca Çevirisi</option>
                        <option value="uk">Ukraynaca Çevirisi</option>
                        <option value="pt">Portekizce Çevirisi</option>
                        <option value="none">Sadece Özel Promptlar</option>
                    </select>
                </div>
                
                <!-- CHUNK SIZE AYARLARI -->
                <div style="border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; margin-top: 5px;">
                    <label style="font-size: 11px; font-weight: bold; color: #10b981; display: block; margin-bottom: 8px;">Motor Kapasite Ayarları (Chunk)</label>
                    <div style="display: flex; gap: 8px;">
                        <div style="flex: 1; display: flex; flex-direction: column; gap: 4px;">
                            <label style="font-size: 9px; color: #60a5fa; text-transform: uppercase;">Gemini</label>
                            <input type="number" id="chunk-gemini" value="400" class="custom-input" style="padding: 6px; font-size: 11px;">
                        </div>
                        <div style="flex: 1; display: flex; flex-direction: column; gap: 4px;">
                            <label style="font-size: 9px; color: #fb923c; text-transform: uppercase;">Groq</label>
                            <input type="number" id="chunk-groq" value="100" class="custom-input" style="padding: 6px; font-size: 11px;">
                        </div>
                        <div style="flex: 1; display: flex; flex-direction: column; gap: 4px;">
                            <label style="font-size: 9px; color: #10b981; text-transform: uppercase;">DeepL</label>
                            <input type="number" id="chunk-deepl" value="150" class="custom-input" style="padding: 6px; font-size: 11px;">
                        </div>
                    </div>
                </div>
            </div>
        </div>



        <!-- 4. Özel Promptlar -->
        <div class="setting-group" style="margin-top: 5px;">
            <div class="setting-header">
                <label data-i18n="custom_prompts">Özel Promptlar</label>
            </div>
            <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 5px;">
                <textarea id="prompt-gemini" placeholder="Gemini Özel Prompt..." class="custom-input" style="height: 60px; resize: none; font-size: 11px;"></textarea>
                <textarea id="prompt-groq" placeholder="Groq/Llama Özel Prompt..." class="custom-input" style="height: 60px; resize: none; font-size: 11px;"></textarea>
            </div>
        </div>
    </div>

    <!-- Doxmaxima Player -->
    <div class="header">
        <h1 data-i18n="header_title">Doxmaxima Player</h1>
        <label class="switch">
            <input type="checkbox" id="toggle-player" checked>
            <span class="slider round"></span>
        </label>
    </div>

    <!-- Dil Seçici -->
    <div class="setting-group" style="margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px;">
        <div class="setting-header">
            <label for="ui-lang" data-i18n="lang_label">Arayüz Dili:</label>
            <div class="custom-select-wrapper" style="width: 120px;">
                <select id="ui-lang" class="custom-select" style="padding: 6px 12px; height: auto;">
                    <option value="tr">Türkçe</option>
                    <option value="en">English</option>
                </select>
            </div>
        </div>
    </div>

    <div class="settings-container">
        <!-- Altyazı İndirme Butonları -->
        <div class="setting-group" style="display: flex; gap: 10px; justify-content: center; align-items: center; padding: 5px 0 20px 0; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px;">
            <button id="download-sub-btn" style="background: #334155; color: white; border: none; padding: 12px 10px; border-radius: 6px; font-weight: 600; cursor: pointer; font-family: inherit; font-size: 13px; width: 100%; transition: background 0.2s;">
                <span data-i18n="download_btn">Orijinal İndir</span>
            </button>
            <button id="download-clean-sub-btn" style="background: #0ea5e9; color: white; border: none; padding: 12px 10px; border-radius: 6px; font-weight: 600; cursor: pointer; font-family: inherit; font-size: 13px; width: 100%; transition: background 0.2s;">
                <span data-i18n="download_clean_btn">Temizlenmiş İndir</span>
            </button>
            <button id="download-filtered-sub-btn" style="background: #10b981; color: white; border: none; padding: 12px 10px; border-radius: 6px; font-weight: 600; cursor: pointer; font-family: inherit; font-size: 13px; width: 100%; transition: background 0.2s;">
                <span data-i18n="download_filtered_btn">Filtreli İndir</span>
            </button>
        </div>

        <!-- Altyazı Boyutu -->
        <div class="setting-group">
            <div class="setting-header">
                <label for="sub-size" data-i18n="sub_size">Altyazı Boyutu</label>
                <span class="value-display" id="sub-size-val">24px</span>
            </div>
            <input type="range" id="sub-size" min="12" max="48" value="24" class="custom-slider">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 4px;">
                <label for="sub-dynamic-size" data-i18n="sub_dynamic_desc" style="font-size: 11px; color: var(--text-secondary); cursor: pointer;">Tam ekranda otomatik büyür</label>
                <label class="switch switch-small">
                    <input type="checkbox" id="sub-dynamic-size" checked>
                    <span class="slider round"></span>
                </label>
            </div>
        </div>

        <!-- Altyazı Fontu -->
        <div class="setting-group">
            <div class="setting-header">
                <label for="sub-font" data-i18n="sub_font">Altyazı Fontu</label>
            </div>
            <div class="custom-select-wrapper">
                <select id="sub-font" class="custom-select">
                    <option value="Inter, sans-serif">Inter</option>
                    <option value="'Roboto', sans-serif">Roboto</option>
                    <option value="'Poppins', sans-serif">Poppins</option>
                    <option value="'Montserrat', sans-serif">Montserrat</option>
                </select>
            </div>
        </div>

        <!-- Altyazı Kalınlığı -->
        <div class="setting-group">
            <div class="setting-header">
                <label for="sub-weight" data-i18n="sub_weight">Yazı Kalınlığı</label>
                <span class="value-display" id="sub-weight-val">400</span>
            </div>
            <input type="range" id="sub-weight" min="100" max="900" step="1" value="400" class="custom-slider">
        </div>

        <!-- Altyazı Mesafesi -->
        <div class="setting-group">
            <div class="setting-header">
                <label for="sub-spacing" data-i18n="sub_spacing">Harf Mesafesi</label>
                <span class="value-display" id="sub-spacing-val">0px</span>
            </div>
            <input type="range" id="sub-spacing" min="-2" max="10" step="0.5" value="0" class="custom-slider">
        </div>

        <!-- Altyazılar Arası Mesafe -->
        <div class="setting-group">
            <div class="setting-header">
                <label for="sub-distance" data-i18n="sub_distance">Altyazılar Arası Mesafe</label>
                <span class="value-display" id="sub-distance-val">5px</span>
            </div>
            <input type="range" id="sub-distance" min="0" max="50" step="1" value="5" class="custom-slider">
        </div>

        <!-- Altyazı Hizası -->
        <div class="setting-group">
            <div class="setting-header">
                <label for="sub-align" data-i18n="sub_align">Yazı Hizası</label>
            </div>
            <div class="custom-select-wrapper">
                <select id="sub-align" class="custom-select">
                    <option value="left" data-i18n="align_left">Sol</option>
                    <option value="center" data-i18n="align_center" selected>Orta</option>
                    <option value="right" data-i18n="align_right">Sağ</option>
                </select>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 8px;">
                <label for="sub-lock-x" data-i18n="sub_lock_x_desc" style="font-size: 11px; color: var(--text-secondary); cursor: pointer;">Tam ortalar, sağa-sola kaymayı engeller</label>
                <label class="switch switch-small">
                    <input type="checkbox" id="sub-lock-x" checked>
                    <span class="slider round"></span>
                </label>
            </div>
        </div>

        <div class="color-settings">
            <!-- Altyazı Rengi -->
            <div class="setting-group color-group">
                <label for="sub-color" data-i18n="sub_color">Yazı Rengi</label>
                <input type="color" id="sub-color" value="#ffffff" class="custom-color">
            </div>

            <!-- Arkaplan Rengi -->
            <div class="setting-group color-group">
                <label for="sub-bg-color" data-i18n="sub_bg_color">Arkaplan</label>
                <input type="color" id="sub-bg-color" value="#000000" class="custom-color">
            </div>

            <!-- Kenarlık Rengi -->
            <div class="setting-group color-group">
                <label for="sub-stroke-color" data-i18n="sub_stroke_color">Kenarlık Rengi</label>
                <input type="color" id="sub-stroke-color" value="#000000" class="custom-color">
            </div>
        </div>

        <!-- Arkaplan Saydamlığı -->
        <div class="setting-group">
            <div class="setting-header">
                <label for="sub-bg-opacity" data-i18n="sub_bg_opacity">Arkaplan Saydamlığı</label>
                <span class="value-display" id="sub-bg-opacity-val">50%</span>
            </div>
            <input type="range" id="sub-bg-opacity" min="0" max="100" value="50" class="custom-slider">
        </div>

        <!-- Yazı Kenarlığı -->
        <div class="setting-group">
            <div class="setting-header">
                <label for="sub-stroke" data-i18n="sub_stroke">Yazı Kenarlığı</label>
            </div>
            <div class="custom-select-wrapper">
                <select id="sub-stroke" class="custom-select">
                    <option value="none" data-i18n="stroke_none">Yok</option>
                    <option value="0.5px" data-i18n="stroke_light">İnce</option>
                    <option value="1px" data-i18n="stroke_medium" selected>Orta</option>
                    <option value="2px" data-i18n="stroke_heavy">Kalın</option>
                </select>
            </div>
        </div>
    </div>
    
    <script src="ui.js"></script>
</body>
</html>
